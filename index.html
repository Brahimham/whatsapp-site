<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>WhatsApp Link Generator</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

.container{
background:white;
width:350px;
margin:auto;
margin-top:100px;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
cursor:pointer;
}

a{
color:green;
}
</style>

</head>

<body>

<div class="container">

<h2>مولد رابط واتساب</h2>

<input id="number" placeholder="اكتب الرقم مع رمز الدولة">

<input id="message" placeholder="اكتب الرسالة">

<button onclick="generate()">إنشاء الرابط</button>

<p id="result"></p>

</div>

<script>

function generate(){

let number = document.getElementById("number").value
let message = encodeURIComponent(document.getElementById("message").value)

let link = "https://wa.me/"+number+"?text="+message

document.getElementById("result").innerHTML =
'<a href="'+link+'" target="_blank">'+link+'</a>'

}

</script>

</body>
</html>
